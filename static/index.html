<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steve Jobs Quote</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            /* Premium gradient: dark but colorful */
            background: linear-gradient(45deg, #0d0a20, #341235, #112d4a, #033c4f);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            bottom: -50px;
            /* Soda fizz look */
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5), inset 0 0 2px rgba(255, 255, 255, 1);
            animation: floatUp 5s infinite ease-in;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) scale(1.2);
                opacity: 0;
            }
        }

        .quote-container {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            /* Glassmorphism for the card */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4rem 5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            transform: translateY(20px);
            opacity: 0;
            animation: popIn 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards 0.5s;
        }

        @keyframes popIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        blockquote {
            font-size: 3.5rem;
            font-weight: 700;
            background: -webkit-linear-gradient(45deg, #f3ec78, #af4261);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #fff; /* fallback */
            margin: 0 0 2rem 0;
            line-height: 1.3;
        }

        blockquote span {
            background: linear-gradient(120deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        cite {
            font-size: 1.5rem;
            font-weight: 300;
            color: #d1d1d1;
            font-style: normal;
            display: inline-block;
            position: relative;
            letter-spacing: 2px;
        }

        cite::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 2px;
            background: #fff;
            top: 50%;
            left: -40px;
            opacity: 0.5;
        }
        
        cite::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 2px;
            background: #fff;
            top: 50%;
            right: -40px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="bubbles"></div>

    <div class="quote-container">
        <blockquote>
            <span>"</span>Your time is limited, so don't waste it living someone else's life.<span>"</span>
        </blockquote>
        <cite>STEVE JOBS</cite>
    </div>

    <script>
        function createBubbles() {
            const container = document.getElementById('bubbles');
            const bubbleCount = 150; // A lot of small soda-like bubbles

            for (let i = 0; i < bubbleCount; i++) {
                let bubble = document.createElement('div');
                bubble.classList.add('bubble');
                
                // Random small size like soda fizz: 2px to 12px
                let size = Math.random() * 10 + 2; 
                // Random left position: 0% to 100%
                let left = Math.random() * 100;
                // Random duration: 4s to 12s for faster soda fizz
                let animationDuration = Math.random() * 8 + 4;
                // Random delay to scatter them
                let delay = Math.random() * 10;

                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = left + 'vw';
                bubble.style.animationDuration = animationDuration + 's';
                bubble.style.animationDelay = delay + 's';
                
                container.appendChild(bubble);
            }
        }

        // Initialize bubbles after DOM loads
        window.addEventListener('DOMContentLoaded', createBubbles);
    </script>
</body>
</html>
