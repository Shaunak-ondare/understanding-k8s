apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quote-app-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Example for path-based routing
    # nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: quote-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: quote-app-service
            port:
              number: 80
