apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-app-deployment
  labels:
    app: quote-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quote-app-deployment
  template:
    metadata:
      labels:
        app: quote-app-deployment
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: quote-app
        image: shaunakondare/quote-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: quote-app-service
  labels:
    app: quote-app-deployment
spec:
  type: ClusterIP
  selector:
    app: quote-app-deployment
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
